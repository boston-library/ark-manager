name: Test CI with github Actions

on: 
  push: 
    branches:
      - action-ci
    paths:
      - '.github/workflows/build-no-docker.yaml'

jobs:

  build-no-docker:

    runs-on: ubuntu-22.04

    # Define environment variables globally for the job
    env:
      RAILS_ENV: test
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      PGPORT: 5432
      NOKOGIRI_USE_SYSTEM_LIBRARIES: true
      RAILS_VERSION: 6.0.5

    # Services start sidecar containers (Postgres) automatically
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ark_manager_test
        ports:
          - 5432:5432
        # Health check ensures Postgres is ready before the script runs
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use secret
        run: |
          echo "GEONAMES Username is ${{ secrets.GEONAMES_USERNAME }}"
          echo "Google Map API Key is ${{ secrets.GOOGLE_MAPS_API_KEY }}"

      - name: Create .env file
        run: |
          echo "GEONAMES_USERNAME=${{ secrets.GEONAMES_USERNAME }}" > .env
          echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }}" >> .env
          echo "BPLDC_REDIS_CACHE_URL=" >> .env
          echo "ARK_MANAGER_DATABASE_USER=postgres" >> .env
          echo "ARK_MANAGER_DATABASE_PASSWORD=postgres" >> .env
          echo "ARK_MANAGER_DATABASE_HOST=postgres_host" >> .env
          echo "ARK_MANAGER_REDIS_CACHE_URL=redis_cache_url" >> .env
          echo "ARK_MANAGER_DEFAULT_BASE_URL=https://search-dc3dev.bpl.org" >> .env
          echo "ARK_MANAGER_DEFAULT_NAMESPACE=bpl-dev" >> .env
          echo "ARK_MANAGER_OAI_NAMESPACE=oai-dev" >> .env
          echo "CURATOR_SOLR_URL=http://127.0.0.1:8983/solr/curator_development" >> .env
          echo "AZURE_DERIVATIVES_URL=http://127.0.0.1:8888/devstoreaccount1/derivatives" >> .env
          echo "IIIF_SERVER_URL=https://iiifdev.bpl.org/iiif/2/" >> .env
          
          # Debugging: Print .env (Note: Secrets will be masked as ***)
          cat .env

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          # Automatically reads the .ruby-version file
          ruby-version: '.ruby-version'
          # Automatically runs 'bundle install' and caches gems
          bundler-cache: true

      - name: copy database.yaml
        run: |
          pwd
          ls -altr
          cp config/database.yml.sample config/database.yml
          ls -altr config
          cat config/database.yaml
          echo "finished copying database.yml"

      # - name: Create .env file
      #   run: |
      #     echo "GEONAMES_USERNAME=${{ secrets.GEONAME_USERNAME }}" > .env
      #     echo "GOOGLE_MAPS_API_KEY=${{ secrets.GOOGLE_KEY }}" >> .env
      #     echo "BPLDC_REDIS_CACHE_URL=" >> .env

      - name: Database Setup
        run: |
          bundle exec rails db:test:prepare
          bundle exec rails db:test:migrate

      - name: Run Tests
        run: bundle exec rake