name: Test CI with github Actions

on: 
  push: 
    branches:
      - action-ci

jobs:
  test:
    name:  first test
    runs-on: ubuntu-22.04


    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_PASSWORD: ark-manager
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3.10
          bundler-cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Use secret
        run: echo "Google Map API Key is ${{ secrets.GOOGLE_MAPS_API_KEY }}"

      - name: Install packages
        run: bundle install

      - name: rename database.yaml
        run: cp config/database.yml.travis config/database.yml 

      - name: Connect and test
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d ark-manager -c "SELECT 1;"




